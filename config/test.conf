# SERVER 1: The Default (Port 8080)
server {
    listen 8080;
    host 127.0.0.1;
    root /var/www/default;
    
    location / {
        root /var/www/default/html;
    }
    
    # TRAP: A common prefix location
    location /images {
        root /var/www/default/photos;
    }
    
    # TRAP: A longer match to test priority
    location /images/png {
        root /var/www/default/photos/png;
    }
}

# SERVER 2: Same Port, Different Hostname (Testing Host Header)
server {
    listen 8080;
    host test.com;
    root /var/www/test_com;

    location / {
        root /var/www/test_com/public;
    }
}

# SERVER 3: Different Port (Port 9090)
server {
    listen 9090;
    host localhost;
    root /var/www/api;

    # TRAP: No root in location (should inherit from server)
    location /api {
        # No root here
    }
}