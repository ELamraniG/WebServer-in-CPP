

# ==========================================================================
# webserv config
#
# Eval sheet coverage:
#   - multiple interface:port pairs  -> two server blocks, different ports
#   - default error pages            -> error_page
#   - client body limit              -> client_max_body_size
#   - per-route directories          -> location root
#   - directory default file         -> index
#   - per-route method allowlists    -> allowed_methods
#   - HTTP redirection               -> return
#   - file upload storage            -> upload_pass
#   - CGI execution (bonus: >1 type) -> cgi_pass with .py and .php
# ==========================================================================

# -------- site #1 : main site --------------------------------------------
server {
    listen 127.0.0.1:8080;

    error_page 404 404.html;
    error_page 502 502.html;

    client_max_body_size 1M;

    root www/html;
    index index.html;

    location / {
        root www/html;
        index index.html;
        autoindex on;
        allowed_methods GET;
    }

    location /old {
        return 301 /new.html;
    }

    location /uploads {
        root www;
        allowed_methods GET POST DELETE;
        upload_pass www/uploads;
    }

    location /bin-cgi {
        root www;
        allowed_methods GET POST;
        cgi_pass .py /usr/bin/python3;
        cgi_pass .php /usr/bin/php-cgi;
    }
}

# -------- site #2 : different port, different content --------------------
# Demonstrates the "multiple interfaces/ports" eval-sheet requirement.
server {
    listen 127.0.0.1:8081;

    error_page 404 404.html;

    client_max_body_size 1M;

    root www/site2;
    index index.html;

    location / {
        root www/site2;
        index index.html;
        autoindex off;
        allowed_methods GET;
    }
}
