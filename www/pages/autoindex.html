<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Index of AUTOINDEX_URI</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#04050f;color:#e2e8f0;font-family:'DM Sans',sans-serif;min-height:100vh;padding:0 0 60px;}
    .bg{position:fixed;inset:0;z-index:0;overflow:hidden;}
    .bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(167,139,250,.18),transparent);filter:blur(100px);top:-150px;left:-100px;}
    .bg::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(0,240,212,.12),transparent);filter:blur(100px);bottom:-100px;right:-50px;}

    /* ── nav ── */
    nav{position:fixed;top:18px;left:50%;transform:translateX(-50%);width:calc(100% - 64px);max-width:1000px;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-radius:18px;background:rgba(4,5,15,.65);backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.09);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.03em;text-decoration:none;background:linear-gradient(130deg,#00f0d4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .nav-links{display:flex;gap:4px;list-style:none;}
    .nav-links a{color:#94a3b8;text-decoration:none;font-size:14px;font-weight:500;padding:7px 14px;border-radius:10px;transition:all .2s;}
    .nav-links a:hover{color:#fff;background:rgba(255,255,255,.05);}
    .nav-pill{font-size:12px;font-weight:600;color:#00f0d4;background:rgba(0,240,212,.1);border:1px solid rgba(0,240,212,.2);padding:6px 16px;border-radius:30px;display:flex;align-items:center;gap:6px;}
    .pulse{width:7px;height:7px;background:#00f0d4;border-radius:50%;box-shadow:0 0 10px #00f0d4;animation:blink 2s ease infinite;}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}

    /* ── page ── */
    .page{position:relative;z-index:1;max-width:1000px;margin:0 auto;padding:120px 40px 0;}
    .label{font-size:11px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:#00f0d4;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
    .label::before{content:'';width:18px;height:2px;background:#00f0d4;border-radius:1px;}
    h1{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,42px);font-weight:800;letter-spacing:-.03em;margin-bottom:4px;background:linear-gradient(135deg,#00f0d4,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .uri{font-family:'JetBrains Mono',monospace;font-size:12px;color:#475569;margin-bottom:28px;}

    /* ── list ── */
    .list{border:1px solid rgba(255,255,255,.09);border-radius:16px;overflow:hidden;}
    .item{display:flex;align-items:center;gap:14px;padding:13px 20px;text-decoration:none;color:#94a3b8;border-bottom:1px solid rgba(255,255,255,.06);transition:background .15s,color .15s,padding-left .15s;font-size:14px;}
    .item:last-child{border-bottom:none;}
    .item:hover{background:rgba(255,255,255,.05);color:#e2e8f0;padding-left:26px;}
    .item.parent{color:#475569;font-size:13px;}
    .item.dir{color:#a78bfa;}
    .item.dir:hover{color:#c4b5fd;}
    .item.file:hover{color:#00f0d4;}
    .ico{font-size:15px;flex-shrink:0;width:20px;text-align:center;}
    .name{font-family:'JetBrains Mono',monospace;font-size:13px;}

    .footer{margin-top:16px;font-size:11px;color:#334155;letter-spacing:.12em;text-transform:uppercase;text-align:right;}
  </style>
</head>
<body>
  <div class="bg"></div>

  <nav>
    <a class="nav-logo" href="/">webserv</a>
    <ul class="nav-links">
      <li><a href="/">Home</a></li>
      <li><a href="/pages/upload.html">Upload</a></li>
      <li><a href="/pages/playground.html">Playground</a></li>
    </ul>
    <div class="nav-pill"><div class="pulse"></div>autoindex · on</div>
  </nav>

  <div class="page">
    <div class="label">autoindex</div>
    <h1>Index of AUTOINDEX_URI</h1>
    <div class="uri">AUTOINDEX_URI</div>
    <div class="list">
      AUTOINDEX_ENTRIES
    </div>
    <div class="footer">webserv v24.0 &middot; HTTP/1.0 &middot; C++98</div>
  </div>
</body>
</html>
