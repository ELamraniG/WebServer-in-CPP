<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Upload · webserv</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-dark text-light d-flex align-items-center justify-content-center vh-100">
    <div class="card bg-secondary text-light p-4 shadow" style="width: 100%; max-width: 500px;">
        <h2 class="card-title text-center mb-4">Upload File</h2>
        <form action="/uploads" method="POST" enctype="multipart/form-data">
            <div class="mb-3">
                <label for="file" class="form-label">Select a file to upload:</label>
                <input class="form-control bg-dark text-light border-secondary" type="file" id="file" name="file"
                    required>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Upload</button>
                <a href="/" class="btn btn-outline-light">Back to Home</a>
            </div>
        </form>
    </div>
</body>

</html>
